syntax = "proto3";

package user;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/GoSMRiST/protosGaz/gen/go/user;user";

service User {
  rpc GetUser (GetUserRequest) returns (GetUserResponse);
}

message GetUserRequest {
  int64 user_id = 1;
}

message GetUserResponse {
  int64 user_id = 1;
  string nickname = 2;
  string email = 3;
  google.protobuf.Timestamp birth_date = 4;
  string gender = 5;
  string avatar_url = 6;
  int64 meetings_count = 7;
}